# ═══════════════════════════════════════════════════════════════════════════════
#  netlify.toml – Civil Engineering Suite (FINAL – NO REDIRECT LOOPS)
# ═══════════════════════════════════════════════════════════════════════════════

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["public/**"]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────────────────────────
# 1. STATIC ASSETS
# ──────────────────────────────────────────────────────────────────────────────
#
# WHY NO WILDCARD REDIRECTS (/*.png, /*.ico, etc.):
#   In Netlify, /*.png matches ANY path ending in .png — including paths that
#   already start with /public/. This creates an infinite loop:
#     /images/hero-bg.png → /public/images/hero-bg.png → (matches /*.png again)
#     → /public/public/images/hero-bg.png → loops → 404
#   Every loop burns edge requests and function invocations = credit drain.
#   All real cases are covered by the explicit rules below.

# /images/* folder — maps /images/anything to /public/images/anything
[[redirects]]
  from = "/images/*"
  to = "/public/images/:splat"
  status = 200
  force = true

# favicon — browser always requests /favicon.ico at root
[[redirects]]
  from = "/favicon.ico"
  to = "/public/images/favicon.ico"
  status = 200
  force = true

# Root-level images referenced by pc_suite (base href = /)
[[redirects]]
  from = "/hero-bg.png"
  to = "/public/images/hero-bg.png"
  status = 200
  force = true

[[redirects]]
  from = "/og-image.png"
  to = "/public/images/og-image.png"
  status = 200
  force = true

# Sub-app images — each app has its own images folder inside public/
[[redirects]]
  from = "/footing-pro/images/*"
  to = "/public/footing-pro/images/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/beam-pro/images/*"
  to = "/public/beam-pro/images/:splat"
  status = 200
  force = true

[[redirects]]

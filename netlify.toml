[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["public/**"]
  node_bundler = "esbuild"

# ───────────────────────────────────────────────────────────────────
#  STATIC ASSET REDIRECTS (mimic Vercel's public/ serving)
# ───────────────────────────────────────────────────────────────────

# Root images (/images/* → /public/images/*)
[[redirects]]
  from = "/images/*"
  to = "/public/images/:splat"
  status = 200
  force = true

# Root-level image files (favicon.ico, og-image.png, etc.)
[[redirects]]
  from = "/*.png"
  to = "/public/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*.ico"
  to = "/public/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*.jpg"
  to = "/public/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*.jpeg"
  to = "/public/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*.svg"
  to = "/public/:splat"
  status = 200
  force = true

